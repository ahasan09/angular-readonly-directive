<div style="padding: 2rem; max-width: 600px; margin: auto;">
  <h1>Angular Read-Only Directive Demo</h1>

  <!-- Zone 1 -->
  <mat-card style="margin-bottom: 1rem; padding: 1rem;">
    <h2>Zone 1</h2>
    <button mat-raised-button color="primary" (click)="toggle('zone1')">
      {{ readOnlyService.isReadOnly('zone1') ? 'Enable' : 'Disable' }} Zone 1
    </button>
    <div [appReadOnly]="'zone1'" style="margin-top: 1rem;">
      <mat-form-field appearance="outline" style="width: 100%;">
        <mat-label>Text Input</mat-label>
        <input matInput placeholder="Type here..." />
      </mat-form-field>
      <mat-form-field appearance="outline" style="width: 100%;">
        <mat-label>Textarea</mat-label>
        <textarea matInput placeholder="Type here..."></textarea>
      </mat-form-field>
      <mat-checkbox>Check me</mat-checkbox>
      <br /><br />
      <mat-slide-toggle>Toggle me</mat-slide-toggle>
    </div>
  </mat-card>

  <!-- Zone 2 -->
  <mat-card style="padding: 1rem;">
    <h2>Zone 2</h2>
    <button mat-raised-button color="accent" (click)="toggle('zone2')">
      {{ readOnlyService.isReadOnly('zone2') ? 'Enable' : 'Disable' }} Zone 2
    </button>
    <div [appReadOnly]="'zone2'" style="margin-top: 1rem;">
      <mat-form-field appearance="outline" style="width: 100%;">
        <mat-label>Select</mat-label>
        <mat-select>
          <mat-option value="a">Option A</mat-option>
          <mat-option value="b">Option B</mat-option>
        </mat-select>
      </mat-form-field>
      <mat-checkbox>Another checkbox</mat-checkbox>
    </div>
  </mat-card>
</div>
